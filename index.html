],
appendixC: [

    related:[] },
  { id:'appC4', zh:'特别（是）', en:'particularly', stars:2,

    related:[] },
  { id:'appC6', zh:'从现实的角度看', en:'Realistically, ...', stars:2,
    example:'Theoretically, anyone can become a model. Realistically though, in order to become a model a person has to meet multiple criteria.',

    related:[] },
  { id:'appC7', zh:'从历史上看', en:'Historically, ...', stars:2,
    example:'Historically/Traditionally, relations between these two countries have never been close.',

  { id:'appC9', zh:'相比较地来看', en:'relatively', stars:2,
    example:'There are relatively few female airline pilots.',
    learnerTendency:'相对地',
    related:[] },

    example:'Where the cost of government is high, resources for development are correspondingly low.',

appendixD: [
  { id:'appD1', zh:'劳动', en:'labour (英) / labor (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD2', zh:'最喜爱的', en:'favourite (英) / favorite (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD3', zh:'荣誉', en:'honour (英) / honor (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD4', zh:'分析', en:'analyse (英) / analyze (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD5', zh:'中心', en:'centre (英) / center (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD6', zh:'旅行', en:'travelled (英) / traveled (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] },
  { id:'appD7', zh:'实现', en:'fulfil (英) / fulfill (美)', stars:1, example:'', learnerTendency:'英美拼写差异', related:[] }

};

  // 补全未定义话题
  TOPICS.forEach(t => { if (!phraseDB[t.id]) phraseDB[t.id] = []; });
  Object.keys(phraseDB).forEach(topicId => {
    phraseDB[topicId].forEach((p, idx) => { if (!p.id) p.id = `${topicId}-${idx}`; });
  });

  // ---------- 状态管理 ----------
  let currentTab = 'topics';
  let selectedTopicId = 'education';
  let currentPhrase = null;
  let showAnswer = false;
  let lastPhraseId = null;
  let userInitialChoice = null;      // 用户在正面选择的 'know' 或 'unknown'
  let answerRevealed = false;        // 是否已显示答案
  let pendingKnowIncrement = false;  // 是否待处理的认识计数（用于“记错了”回滚）

  let progress = JSON.parse(localStorage.getItem('ielts_adv_progress')) || {
    daily: 0, lastDate: new Date().toDateString(), topics: {}
  };
  if (progress.lastDate !== new Date().toDateString()) {
    progress.daily = 0; progress.lastDate = new Date().toDateString();
  }

  function saveProgress() {
    localStorage.setItem('ielts_adv_progress', JSON.stringify(progress));
    document.getElementById('globalProgress').innerText = `今日已学 ${progress.daily}`;
  }

  function getTopicProgress(topicId) {
    if (!progress.topics[topicId]) progress.topics[topicId] = { mastered: [], reviewQueue: [], knowCounts: {} };
    return progress.topics[topicId];
  }

  function getNextPhrase(topicId) {
    const phrases = phraseDB[topicId] || [];
    if (phrases.length === 0) return null;
    const tp = getTopicProgress(topicId);
    if (tp.reviewQueue.length > 0) {
      let candidates = tp.reviewQueue;
      if (candidates.length > 1 && lastPhraseId) candidates = candidates.filter(id => id !== lastPhraseId);
      const nextId = candidates[Math.floor(Math.random() * candidates.length)];
      lastPhraseId = nextId;
      return phrases.find(p => p.id === nextId);
    }
    const unmastered = phrases.filter(p => !tp.mastered.includes(p.id));
    if (unmastered.length === 0) return null;
    let candidates = unmastered.map(p => p.id);
    if (candidates.length > 1 && lastPhraseId) candidates = candidates.filter(id => id !== lastPhraseId);
    const nextId = candidates[Math.floor(Math.random() * candidates.length)];
    lastPhraseId = nextId;
    return phrases.find(p => p.id === nextId);
  }

  function markKnow(topicId, phraseId, increment = true) {
    const tp = getTopicProgress(topicId);
    if (!tp.knowCounts[phraseId]) tp.knowCounts[phraseId] = 0;
    if (increment) {
      tp.knowCounts[phraseId]++;
      tp.reviewQueue = tp.reviewQueue.filter(id => id !== phraseId);
      if (tp.knowCounts[phraseId] >= 3 && !tp.mastered.includes(phraseId)) {
        tp.mastered.push(phraseId); progress.daily++;
      }
    } else {
      tp.knowCounts[phraseId] = 0;
      if (!tp.reviewQueue.includes(phraseId)) tp.reviewQueue.push(phraseId);
      const idx = tp.mastered.indexOf(phraseId); if (idx > -1) tp.mastered.splice(idx, 1);
    }
    saveProgress();
  }

  function resetTopic(topicId) {
    progress.topics[topicId] = { mastered: [], reviewQueue: [], knowCounts: {} };
    lastPhraseId = null; saveProgress();
  }

  function speakEnglish(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB'; u.rate = 0.9;
    const voices = speechSynthesis.getVoices();
    const uk = voices.find(v => v.lang === 'en-GB' && v.name.includes('Google'));
    if (uk) u.voice = uk;
    speechSynthesis.speak(u);
  }

  // ---------- UI 渲染 ----------
  const contentDiv = document.getElementById('mainContent');
  function render() {
    if (currentTab === 'topics') renderTopics();
    else if (currentTab === 'learn') renderLearn();
    else if (currentTab === 'stats') renderStats();
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === currentTab));
  }

  function renderTopics() {
  let html = `<div class="topic-grid">`;
  TOPICS.forEach(t => {
    const phrases = phraseDB[t.id] || [];
    const tp = getTopicProgress(t.id);
    const mastered = tp.mastered.length;
    const total = phrases.length;
    const isCompleted = total > 0 && mastered === total;
    // 显示完成标记
    const completedIcon = isCompleted ? ' ✅' : '';
    html += `<div class="topic-card ${selectedTopicId===t.id?'active':''}" data-topic="${t.id}">
      <div class="topic-emoji">${t.emoji}</div>
      <div class="topic-name">${t.name}${completedIcon}</div>
      <div class="topic-progress">${mastered}/${total} 掌握</div>
    </div>`;
  });
  html += `</div><div style="display:flex; gap:12px; justify-content:center;">
    <button class="btn btn-primary" id="startLearnBtn">🎯 开始学习 ${TOPICS.find(t=>t.id===selectedTopicId)?.name}</button>
    <button class="btn" id="resetTopicBtn">🔄 重置进度</button></div>`;
  contentDiv.innerHTML = html;
  
  // 绑定话题卡片点击事件：直接开始学习
  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', (e) => {
      selectedTopicId = card.dataset.topic;
      // 获取该话题下一个短语
      const next = getNextPhrase(selectedTopicId);
      if (!next) {
        // 如果全部掌握，询问是否重置
        if (confirm('🎉 这个话题你已经全部掌握啦！是否重置进度重新学习？')) {
          resetTopic(selectedTopicId);
        }
        renderTopics();
        return;
      }
      // 直接进入学习
      currentPhrase = next;
      showAnswer = false;
      currentTab = 'learn';
      render();
    });
  });
  
  // 底部按钮保留，作为备选
  document.getElementById('startLearnBtn')?.addEventListener('click', () => {
    const next = getNextPhrase(selectedTopicId);
    if (!next) { 
      if (confirm('🎉 这个话题你已经全部掌握啦！是否重置进度重新学习？')) {
        resetTopic(selectedTopicId);
        renderTopics();
      }
      return; 
    }
    currentPhrase = next; 
    showAnswer = false; 
    currentTab = 'learn'; 
    render();
  });
  
  document.getElementById('resetTopicBtn')?.addEventListener('click', () => {
    if (confirm('确定重置本话题的学习进度吗？')) { 
      resetTopic(selectedTopicId); 
      renderTopics(); 
    }
  });
}

  function renderLearn() {
  if (!currentPhrase) {
    const next = getNextPhrase(selectedTopicId);
    if (!next) {
      contentDiv.innerHTML = `<div class="learning-card"><h3>🎉 恭喜！本话题已全部掌握！</h3><button class="btn btn-primary" id="backToTopics">返回话题</button></div>`;
      document.getElementById('backToTopics')?.addEventListener('click', () => { currentTab = 'topics'; render(); });
      return;
    }
    currentPhrase = next;
  }

  const phrase = currentPhrase;
  const tp = getTopicProgress(selectedTopicId);
  const knowCount = tp.knowCounts[phrase.id] || 0;
  const isReview = tp.reviewQueue.includes(phrase.id);

  let cardHtml = `<div class="learning-card">`;

  // ========== 正面：只显示中文 + 认识/不认识按钮 ==========
  if (!answerRevealed) {
    cardHtml += `<div class="card-front">
      <div style="color:#7e6b5a; margin-bottom:10px;">
        🔁 认识次数: ${knowCount}/3 ${isReview ? ' <span class="review-badge">📌 复习中</span>' : ''}
      </div>
      <div class="phrase-zh">${phrase.zh}</div>
      <p style="margin-top:20px; color:#aaa; font-size:0.9rem;">请先选择你对该短语的熟悉程度</p>
    </div>`;

    cardHtml += `<div class="action-buttons">`;
    cardHtml += `<button class="btn btn-success" id="initialKnowBtn">😊 认识</button>`;
    cardHtml += `<button class="btn btn-warning" id="initialUnknownBtn">🤔 不认识</button>`;
    cardHtml += `</div>`;
  }

  // ========== 背面：显示英文 + 详细信息 + 记错了/下一个 ==========
  else {
    const stars = '⭐'.repeat(phrase.stars || 1);
    cardHtml += `<div class="card-back">
      <div class="stars">${stars}</div>
      <div class="phrase-en">${phrase.en}</div>`;
    if (phrase.learnerTendency) {
      cardHtml += `<div class="learner-tendency">📘 学习者倾向：${phrase.learnerTendency}</div>`;
    }
    cardHtml += `<div class="example-box">📌 ${phrase.example || '暂无例句'}</div>`;
    if (phrase.related && phrase.related.length) {
      cardHtml += `<table class="related-table"><tr><th>类型</th><th>英文</th><th>中文</th><th>例句</th></tr>`;
      phrase.related.forEach(r => {
        cardHtml += `<tr><td>${r.type}</td><td>${r.en}</td><td>${r.zh}</td><td>${r.example || ''}</td></tr>`;
      });
      cardHtml += `</table>`;
    }
    cardHtml += `</div>`;

    // 显示答案后，提供“记错了”和“下一个”按钮
    cardHtml += `<div class="action-buttons">`;
    cardHtml += `<button class="btn btn-warning" id="wrongBtn">🔄 记错了</button>`;
    cardHtml += `<button class="btn btn-success" id="nextAfterAnswerBtn">⏩ 下一个</button>`;
    cardHtml += `</div>`;
  }

  cardHtml += `<div style="margin-top:16px; text-align:center;">
    <button class="btn" id="skipBtn">⏭️ 跳过</button>
  </div>`;
  cardHtml += `</div>`;

  contentDiv.innerHTML = cardHtml;

  // ========== 绑定事件 ==========
  if (!answerRevealed) {
    // 正面：认识 / 不认识
    document.getElementById('initialKnowBtn')?.addEventListener('click', () => {
      userInitialChoice = 'know';
      pendingKnowIncrement = true;
      answerRevealed = true;
      renderLearn();
      speakEnglish(phrase.en);
    });

    document.getElementById('initialUnknownBtn')?.addEventListener('click', () => {
      userInitialChoice = 'unknown';
      pendingKnowIncrement = false;
      answerRevealed = true;
      renderLearn();
      speakEnglish(phrase.en);
    });
  } else {
    // 背面：记错了 / 下一个
    document.getElementById('wrongBtn')?.addEventListener('click', () => {
      // “记错了”：若之前选了“认识”，则作废计数；若选了“不认识”，本就无计数
      if (userInitialChoice === 'know' && pendingKnowIncrement) {
        // 撤销可能已增加的认识计数（实际上尚未调用 markKnow，所以无需撤销）
        // 直接标记为不认识即可
        markKnow(selectedTopicId, phrase.id, false);
      } else if (userInitialChoice === 'unknown') {
        markKnow(selectedTopicId, phrase.id, false);
      }
      // 重置状态，获取下一个短语
      const next = getNextPhrase(selectedTopicId);
      if (!next) { currentTab = 'topics'; render(); alert('🎉 话题完成！'); }
      else {
        currentPhrase = next;
        answerRevealed = false;
        userInitialChoice = null;
        pendingKnowIncrement = false;
        renderLearn();
      }
    });

    document.getElementById('nextAfterAnswerBtn')?.addEventListener('click', () => {
      // “下一个”：确认之前的选择
      if (userInitialChoice === 'know' && pendingKnowIncrement) {
        markKnow(selectedTopicId, phrase.id, true);
      } else if (userInitialChoice === 'unknown') {
        markKnow(selectedTopicId, phrase.id, false);
      }
      const next = getNextPhrase(selectedTopicId);
      if (!next) { currentTab = 'topics'; render(); alert('🎉 话题完成！'); }
      else {
        currentPhrase = next;
        answerRevealed = false;
        userInitialChoice = null;
        pendingKnowIncrement = false;
        renderLearn();
      }
    });
  }

  // “跳过”按钮：直接下一个，不计任何认识变化
  document.getElementById('skipBtn')?.addEventListener('click', () => {
    const next = getNextPhrase(selectedTopicId);
    if (!next) { currentTab = 'topics'; render(); alert('🎉 话题完成！'); }
    else {
      currentPhrase = next;
      answerRevealed = false;
      userInitialChoice = null;
      pendingKnowIncrement = false;
      renderLearn();
    }
  });
}

  function renderStats() {
    let totalPhrases = 0, totalMastered = 0, totalReview = 0;
    TOPICS.forEach(t => {
      totalPhrases += (phraseDB[t.id] || []).length;
      const tp = getTopicProgress(t.id);
      totalMastered += tp.mastered.length;
      totalReview += tp.reviewQueue.length;
    });
    const percent = totalPhrases ? Math.round(totalMastered/totalPhrases*100) : 0;
    contentDiv.innerHTML = `<div class="learning-card"><h2>📊 总体进度</h2><p>📚 总短语: ${totalPhrases}</p><p>✅ 已掌握: ${totalMastered}</p><p>🔄 待复习: ${totalReview}</p><p>🔥 今日掌握: ${progress.daily}</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
      <p style="margin-top:20px;">💡 连续3次「认识」即掌握</p><button class="btn btn-primary" id="backToTopicsFromStats">返回话题</button></div>`;
    document.getElementById('backToTopicsFromStats').addEventListener('click', ()=>{ currentTab='topics'; render(); });
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      currentTab = item.dataset.tab;
      if (currentTab === 'learn' && !currentPhrase) {
        const next = getNextPhrase(selectedTopicId);
        if (!next) { alert('请先选择一个话题'); currentTab='topics'; }
        else currentPhrase = next;
      }
      render();
    });
  });

  if (window.speechSynthesis) speechSynthesis.getVoices();
  saveProgress();
  render();
})();
</script>
